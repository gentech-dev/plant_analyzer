<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gentech Pro | 靖軒科技照明</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              // Japanese Modern / Warm Minimalism Palette
              background: '#FAF9F6', // Off-white / Paper
              surface: '#ffffff', // Pure White
              surfaceHighlight: '#f5f5f4', // Stone 100
              border: '#e7e5e4', // Stone 200
              
              brand: {
                bronze: '#A89166', // Antique Bronze (Rinnai Style)
                bronzeLight: '#D6C6A6', // Light Champagne
                bronzeDark: '#806D48', // Darker Bronze
                text: '#292524', // Stone 800 (Charcoal)
                muted: '#78716c', // Stone 500 (Warm Grey)
                dark: '#1c1917', // Stone 900
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'], // Optional for headings if needed
              mono: ['JetBrains Mono', 'monospace'],
            },
            animation: {
              'fade-in': 'fadeIn 0.6s ease-out forwards', // Slower, more elegant fade
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(15px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #FAF9F6;
        color: #292524;
        font-family: 'Inter', sans-serif;
      }

      /* Remove default number input spinner */
      input[type=number]::-webkit-inner-spin-button, 
      input[type=number]::-webkit-outer-spin-button { 
        -webkit-appearance: none; 
        margin: 0; 
      }
      input[type=number] {
        -moz-appearance: textfield;
      }

      /* Custom Scrollbar - Minimalist */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #d6d3d1; 
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a8a29e; 
      }
      
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
    </style>

    "react-dom": "https://aistudiocdn.com/react-dom@^19.2.0"
  }
}
</script>
